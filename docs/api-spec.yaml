openapi: 3.0.3
info:
  title: QRMEAL API
  version: 0.1.0
servers:
  - url: http://localhost:4000
paths:
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        "200":
          description: JWT issued
  /menu:
    get:
      summary: List menu items
      responses:
        "200": { description: Menu list }
  /orders:
    post:
      summary: Create order
      responses:
        "201": { description: Order created }
    get:
      summary: List active orders
      responses:
        "200": { description: Orders list }
  /orders/{id}/status:
    patch:
      summary: Update order status
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, preparing, ready, served, cancelled]
      responses:
        "200": { description: Status updated }
  /payments/counter:
    post:
      summary: Mark counter payment
      responses:
        "200": { description: Payment recorded }
