<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRMEAL — Welcome</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>
  body { background: var(--slate-50); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; }
  .welcome { background: var(--slate-50); height: 100%; display: flex; flex-direction: column; }
  .hero { display: flex; flex-direction: column; align-items: center; padding: 48px 32px 28px; flex-shrink: 0; }
  .qr-circle {
    width: 110px; height: 110px; border-radius: 50%;
    background: linear-gradient(145deg, var(--teal-100), var(--teal-200));
    display: flex; align-items: center; justify-content: center; margin-bottom: 28px;
    box-shadow: 0 8px 32px rgba(13,148,136,0.15);
  }
  .qr-circle svg { width: 50px; height: 50px; color: var(--teal-700); }
  .brand { font-size: 34px; font-weight: 800; color: var(--teal-600); letter-spacing: 5px; margin-bottom: 6px; }
  .tagline { font-size: 16px; color: var(--slate-500); font-weight: 500; }
  .welcome-card {
    background: var(--white); border-radius: var(--r-xl); box-shadow: var(--shadow-md);
    padding: 28px 24px; margin: 0 20px; text-align: center;
  }
  .wc-label { font-size: 13px; color: var(--slate-400); font-weight: 500; margin-bottom: 4px; }
  .wc-name { font-size: 21px; font-weight: 700; margin-bottom: 14px; }
  .table-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--teal-50); padding: 8px 20px; border-radius: var(--r-full);
    font-size: 14px; font-weight: 600; color: var(--teal-600);
  }
  .table-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--teal-500); }
  .features { display: flex; gap: 10px; padding: 20px; flex-shrink: 0; }
  .feat-card {
    flex: 1; background: var(--white); border-radius: var(--r-lg);
    padding: 16px 8px; text-align: center; box-shadow: var(--shadow-xs);
  }
  .feat-icon {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 10px; font-size: 18px;
  }
  .feat-label { font-size: 11px; color: var(--slate-500); font-weight: 500; line-height: 1.5; }
  .cta-wrap { padding: 12px 20px 36px; margin-top: auto; flex-shrink: 0; }
  .cta-sub { text-align: center; margin-top: 12px; font-size: 12px; color: var(--slate-400); }
  .guest-row {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin: 0 20px; padding: 14px; background: var(--white);
    border-radius: var(--r-lg); box-shadow: var(--shadow-xs);
  }
  .guest-row span { font-size: 13px; color: var(--slate-500); font-weight: 500; }
  .guest-row strong { font-size: 14px; color: var(--teal-600); }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="notch"></div>
  <div class="status-bar"><span>9:41</span><span style="display:flex;gap:4px;align-items:center;"><span style="font-size:10px;">&#9679;&#9679;&#9679;</span></span></div>
  <div class="screen-body">
    <div class="welcome">
      <div class="hero animate-in">
        <div class="qr-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3h-3z"/><path d="M21 14v7h-7"/></svg>
        </div>
        <div class="brand">QRMEAL</div>
        <div class="tagline">Scan. Order. Enjoy.</div>
      </div>

      <div class="welcome-card animate-in" style="animation-delay:0.1s">
        <div class="wc-label">Welcome to</div>
        <div class="wc-name">The Gourmet Kitchen</div>
        <div class="table-badge"><div class="dot"></div> Table 12</div>
      </div>

      <div class="features animate-in" style="animation-delay:0.2s">
        <div class="feat-card">
          <div class="feat-icon" style="background:var(--teal-50);color:var(--teal-600);">&#9889;</div>
          <div class="feat-label">Quick<br>Ordering</div>
        </div>
        <div class="feat-card">
          <div class="feat-icon" style="background:var(--coral-50);color:var(--coral-400);">&#128337;</div>
          <div class="feat-label">Real-time<br>Tracking</div>
        </div>
        <div class="feat-card">
          <div class="feat-icon" style="background:var(--lavender-50);color:var(--lavender-400);">&#10133;</div>
          <div class="feat-label">Easy<br>Add-ons</div>
        </div>
      </div>

      <div class="guest-row animate-in" style="animation-delay:0.25s">
        <span>&#128101;</span>
        <span>Guests at this table:</span>
        <strong>4</strong>
      </div>

      <div class="cta-wrap animate-in" style="animation-delay:0.3s">
        <button class="btn btn-primary btn-full" style="padding:18px;font-size:16px;">Browse Menu</button>
        <div class="cta-sub">No app download required &middot; Powered by QRMEAL</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
